syntax = "proto3";

option java_multiple_files = true;
option java_package = "servicestubs";

package cn2425tf; // package do proto

service cn2425tf {
    rpc uploadImage(stream ImageBlock) returns (ReturnFile);
}
message ProtoVoid { }

message TextMessage {string txt = 1;}

message ImageBlock{
    string imageName = 1;
    string imageType = 2;
    bytes dataBlock = 3;
}
message ReturnFile{
    string requestId = 1;
}
