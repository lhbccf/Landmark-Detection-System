syntax = "proto3";

option java_multiple_files = true;
option java_package = "servicestubs";

package cn2425tf; // package do proto

service cn2425tf {
    rpc uploadImage(ImageFile) returns (ReturnFile);
}
message ProtoVoid { }

message TextMessage {string txt = 1;}

message ImageFile{
    string imageType = 1;
    string imageName = 2;
    bytes imageData = 3;
}
message ReturnFile{
    string fileId = 1;
}
